<!DOCTYPE html>
<html lang="en">

<head>
  <script>
    (function () {
      const savedTheme = localStorage.getItem('theme') || 'dark';
      if (savedTheme === 'light') {
        document.documentElement.classList.add('light-theme');
      }
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>In Progress — Learning Roadmaps</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <style>
    :root {
      --font-sans: 'Outfit', sans-serif;
      --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;

      --color-bg-base: #0f1115;
      --color-bg-gradient: radial-gradient(circle at top center, #1a1d24, #0f1115 80%);
      --color-background-primary: rgba(30, 33, 40, 0.6);
      --color-background-secondary: rgba(45, 49, 58, 0.7);
      --color-border-primary: rgba(255, 255, 255, 0.15);
      --color-border-secondary: rgba(255, 255, 255, 0.08);
      --color-border-tertiary: rgba(255, 255, 255, 0.04);

      --color-text-primary: #f8f9fa;
      --color-text-secondary: #adb5bd;
      --color-text-tertiary: #6c757d;

      --color-accent: #6366f1;
      --color-accent-glow: rgba(99, 102, 241, 0.25);
      --color-accent-soft: rgba(99, 102, 241, 0.12);

      --border-radius-md: 12px;
      --border-radius-lg: 16px;
    }

    /* ── Light Theme ─────────────────────────────────────── */
    :root.light-theme {
      --color-bg-base: #f5f7fa;
      --color-bg-gradient: radial-gradient(circle at top center, #ffffff, #edf0f5 80%);
      --color-background-primary: rgba(255, 255, 255, 0.85);
      --color-background-secondary: rgba(235, 238, 243, 0.95);
      --color-border-primary: rgba(0, 0, 0, 0.12);
      --color-border-secondary: rgba(0, 0, 0, 0.06);
      --color-border-tertiary: rgba(0, 0, 0, 0.03);

      --color-text-primary: #1a202c;
      --color-text-secondary: #4a5568;
      --color-text-tertiary: #718096;

      --color-accent: #4f46e5;
      --color-accent-glow: rgba(79, 70, 229, 0.15);
      --color-accent-soft: rgba(79, 70, 229, 0.08);
    }

    /* ── Reset & Base ────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      background: var(--color-bg-base);
      background-image: var(--color-bg-gradient);
      background-attachment: fixed;
      color: var(--color-text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── Background Orbs ─────────────────────────────────── */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }

    .bg-orb-1 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.12), transparent 70%);
      top: -120px;
      left: -100px;
      animation: drift1 12s ease-in-out infinite alternate;
    }

    .bg-orb-2 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.1), transparent 70%);
      bottom: -80px;
      right: -80px;
      animation: drift2 15s ease-in-out infinite alternate;
    }

    .light-theme .bg-orb-1 {
      background: radial-gradient(circle, rgba(99, 102, 241, 0.06), transparent 70%);
    }

    .light-theme .bg-orb-2 {
      background: radial-gradient(circle, rgba(168, 85, 247, 0.05), transparent 70%);
    }

    @keyframes drift1 {
      to {
        transform: translate(40px, 30px);
      }
    }

    @keyframes drift2 {
      to {
        transform: translate(-30px, -20px);
      }
    }

    /* ── Theme Toggle ────────────────────────────────────── */
    .theme-toggle-btn {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--color-background-primary);
      border: 1px solid var(--color-border-secondary);
      color: var(--color-text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      z-index: 1000;
      transition: all 0.3s ease;
    }

    .theme-toggle-btn:hover {
      transform: scale(1.1);
      border-color: var(--color-border-primary);
    }

    /* ── Main Card ───────────────────────────────────────── */
    .page-wrapper {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 2rem 1.5rem;
      max-width: 560px;
      width: 100%;
      animation: fadeUp 0.7s cubic-bezier(0.4, 0, 0.2, 1) both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(28px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Illustration ────────────────────────────────────── */
    .illustration-wrap {
      position: relative;
      width: 180px;
      height: 180px;
      margin-bottom: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .illustration-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: var(--color-accent-soft);
      animation: pulse-ring 2.8s ease-in-out infinite;
    }

    .illustration-wrap::after {
      content: '';
      position: absolute;
      inset: -16px;
      border-radius: 50%;
      border: 1px solid var(--color-accent);
      opacity: 0.2;
      animation: pulse-ring 2.8s ease-in-out infinite 0.5s;
    }

    @keyframes pulse-ring {

      0%,
      100% {
        transform: scale(1);
        opacity: 0.6;
      }

      50% {
        transform: scale(1.08);
        opacity: 0.2;
      }
    }

    .illustration-img {
      width: 110px;
      height: 110px;
      object-fit: contain;
      position: relative;
      z-index: 2;
      filter: drop-shadow(0 8px 24px rgba(99, 102, 241, 0.35));
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    /* ── Badge ───────────────────────────────────────────── */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: 0.38rem 1rem;
      border-radius: 100px;
      background: var(--color-accent-soft);
      border: 1px solid var(--color-accent-glow);
      color: var(--color-accent);
      margin-bottom: 1.5rem;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--color-accent);
      animation: blink 1.6s ease-in-out infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.25;
      }
    }

    /* ── Heading ─────────────────────────────────────────── */
    h1 {
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: -1.5px;
      line-height: 1.1;
      margin-bottom: 1.1rem;
      background: linear-gradient(135deg, var(--color-text-primary) 40%, var(--color-text-tertiary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .light-theme h1 {
      background: linear-gradient(135deg, #1a202c 40%, #718096);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .description {
      font-size: 1.05rem;
      font-weight: 300;
      color: var(--color-text-secondary);
      line-height: 1.7;
      margin-bottom: 2.5rem;
      max-width: 400px;
    }

    /* ── Progress Bar ────────────────────────────────────── */
    .progress-wrap {
      width: 100%;
      max-width: 360px;
      margin-bottom: 2.5rem;
    }

    .progress-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      color: var(--color-text-tertiary);
      margin-bottom: 0.6rem;
      font-family: var(--font-mono);
    }

    .progress-track {
      height: 6px;
      background: var(--color-border-secondary);
      border-radius: 100px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      border-radius: 100px;
      background: linear-gradient(90deg, var(--color-accent), #a78bfa);
      width: 0%;
      animation: fill-bar 2.2s 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes fill-bar {
      to {
        width: 68%;
      }
    }

    /* ── Info Cards ──────────────────────────────────────── */
    .info-cards {
      display: flex;
      gap: 0.85rem;
      width: 100%;
      max-width: 400px;
      margin-bottom: 2.5rem;
    }

    .info-card {
      flex: 1;
      background: var(--color-background-primary);
      border: 1px solid var(--color-border-secondary);
      border-radius: var(--border-radius-md);
      padding: 1rem;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      transition: border-color 0.2s, transform 0.2s;
    }

    .info-card:hover {
      border-color: var(--color-border-primary);
      transform: translateY(-2px);
    }

    .info-card i {
      font-size: 1.5rem;
      color: var(--color-accent);
      opacity: 0.85;
    }

    .info-card-label {
      font-size: 0.72rem;
      color: var(--color-text-tertiary);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 500;
    }

    .info-card-value {
      font-size: 0.92rem;
      color: var(--color-text-primary);
      font-weight: 600;
    }

    /* ── Actions ─────────────────────────────────────────── */
    .actions {
      display: flex;
      gap: 0.9rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.8rem 1.75rem;
      border-radius: var(--border-radius-md);
      font-size: 0.95rem;
      font-weight: 600;
      font-family: var(--font-sans);
      text-decoration: none;
      background: var(--color-accent);
      color: #fff;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 20px var(--color-accent-glow);
    }

    .btn-primary:hover {
      background: #4f46e5;
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(99, 102, 241, 0.4);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.8rem 1.5rem;
      border-radius: var(--border-radius-md);
      font-size: 0.95rem;
      font-weight: 500;
      font-family: var(--font-sans);
      text-decoration: none;
      background: var(--color-background-primary);
      color: var(--color-text-primary);
      border: 1px solid var(--color-border-secondary);
      cursor: pointer;
      backdrop-filter: blur(12px);
      transition: all 0.2s ease;
    }

    .btn-secondary:hover {
      border-color: var(--color-border-primary);
      transform: translateY(-2px);
    }

    /* ── Footer ──────────────────────────────────────────── */
    .footer-note {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.8rem;
      color: var(--color-text-tertiary);
      letter-spacing: 0.5px;
    }

    .footer-note a {
      color: var(--color-accent);
      text-decoration: none;
      font-weight: 500;
    }

    .footer-note a:hover {
      text-decoration: underline;
    }

    /* ── Scrollbar ───────────────────────────────────────── */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--color-bg-base);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--color-border-primary);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--color-text-secondary);
    }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 480px) {
      h1 {
        font-size: 2rem;
      }

      .illustration-wrap {
        width: 140px;
        height: 140px;
      }

      .illustration-img {
        width: 86px;
        height: 86px;
      }

      .info-cards {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <!-- Background orbs -->
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>

  <!-- Theme toggle -->
  <button class="theme-toggle-btn" onclick="toggleTheme()" aria-label="Toggle Theme" id="theme-btn">
    <i class="ti ti-moon" id="theme-icon"></i>
  </button>

  <div class="page-wrapper">

    <!-- Floating illustration -->
    <div class="illustration-wrap">
      <img src="" alt="In Progress" class="illustration-img" id="illustration-img">
    </div>

    <!-- Status badge -->
    <div class="status-badge">
      <span class="status-dot"></span>
      In Progress
    </div>

    <!-- Heading -->
    <h1>Coming Soon</h1>

    <p class="description">
      This content is currently being crafted. Check back soon — we're building something great here.
    </p>

    <!-- Progress bar -->
    <div class="progress-wrap">
      <div class="progress-labels">
        <span>Build Progress</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-bar" id="progress-fill"></div>
      </div>
    </div>

    <!-- Info cards -->
    <div class="info-cards">
      <div class="info-card">
        <i class="ti ti-calendar-check"></i>
        <span class="info-card-label">Status</span>
        <span class="info-card-value">Active Dev</span>
      </div>
      <div class="info-card">
        <i class="ti ti-file-text"></i>
        <span class="info-card-label">Content</span>
        <span class="info-card-value">Writing</span>
      </div>
      <div class="info-card">
        <i class="ti ti-rocket"></i>
        <span class="info-card-label">Launch</span>
        <span class="info-card-value">Very Soon</span>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <a href="#" id="home-btn" class="btn-primary">
        <i class="ti ti-home"></i> Back to Home
      </a>
      <button onclick="goBack()" class="btn-secondary">
        <i class="ti ti-arrow-left"></i> Go Back
      </button>
    </div>

  </div>

  <!-- Footer note -->
  <p class="footer-note">
    Interactive Roadmaps &nbsp;·&nbsp; <a href="#" id="footer-home-link">View available roadmaps →</a>
  </p>

  <script>
    // ── Resolve root for GitHub Pages (works at / or /subdir/) ───
    // Walk up from the current 404 URL until we find the repo root
    // Strategy: the 404.html is always at the root of the site.
    // GitHub Pages sets the base to whatever the Pages root is.
    // We use the repo root by removing everything after the last
    // known base segment. Since 404.html sits at the site root,
    // we just need to point to index.html relative to the Pages root.
    // Resolve the GitHub Pages site root so all assets and links work
    // regardless of which broken URL triggered the 404.
    // e.g. visiting /roadmaps.io/langgraph/phases/x.pdf still finds
    // /roadmaps.io/404.png and /roadmaps.io/ correctly.
    var siteRoot = (function () {
      const origin = window.location.origin;
      const pathParts = window.location.pathname.split('/').filter(Boolean);
      // GitHub project pages: origin/repoName/...
      // The repo name is always the first path segment on github.io
      if (window.location.hostname.endsWith('github.io') && pathParts.length >= 1) {
        return origin + '/' + pathParts[0] + '/';
      }
      // User/org pages or custom domains: root is just origin/
      return origin + '/';
    })();

    // Fix all paths that depend on site root
    (function applyRootPaths() {
      // 1. Image — must be absolute so it loads regardless of current URL depth
      const img = document.getElementById('illustration-img');
      if (img) img.src = siteRoot + '404.png';

      // 2. Home links
      const homeLink = document.getElementById('home-btn');
      const footerLink = document.getElementById('footer-home-link');
      if (homeLink) homeLink.href = siteRoot;
      if (footerLink) footerLink.href = siteRoot;
    })();

    // Go Back: use browser history if available, otherwise go home
    function goBack() {
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = siteRoot;
      }
    }

    // ── Theme toggle ─────────────────────────────────────
    function toggleTheme() {
      const isLight = document.documentElement.classList.toggle('light-theme');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
      updateIcon();
    }
    function updateIcon() {
      const icon = document.getElementById('theme-icon');
      if (!icon) return;
      icon.className = document.documentElement.classList.contains('light-theme')
        ? 'ti ti-sun'
        : 'ti ti-moon';
    }

    // ── Animate progress counter ─────────────────────────
    function animateProgress(targetPct, duration) {
      const label = document.getElementById('progress-pct');
      let start = null;
      function step(ts) {
        if (!start) start = ts;
        const progress = Math.min((ts - start) / duration, 1);
        const ease = progress * (2 - progress); // ease-out quad
        label.textContent = Math.floor(ease * targetPct) + '%';
        if (progress < 1) requestAnimationFrame(step);
        else label.textContent = targetPct + '%';
      }
      requestAnimationFrame(step);
    }

    document.addEventListener('DOMContentLoaded', () => {
      updateIcon();
      // Delay the progress counter to sync with CSS bar animation
      setTimeout(() => animateProgress(68, 2000), 400);
    });
  </script>
</body>

</html>
